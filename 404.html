<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>ไม่พบหน้านี้ (404) — CYN Medical Digital Agency</title>
    <link rel="icon" type="image/webp" href="/assets/cyn-logo.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins','Kanit',system-ui,-apple-system,sans-serif;background:#070F1E;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
        .wrap{max-width:560px}
        .logo{height:44px;width:auto;margin:0 auto 40px;display:block}
        .code{font-family:'Cormorant Garamond','Kanit',serif;font-weight:500;font-size:clamp(96px,22vw,180px);line-height:.9;letter-spacing:-.02em;color:#2D4DB1;background:linear-gradient(180deg,#5B79D6,#2D4DB1);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        h1{font-size:clamp(22px,5vw,30px);font-weight:600;margin-top:8px;letter-spacing:-.01em}
        p{color:rgba(255,255,255,.55);font-size:15px;line-height:1.8;margin-top:16px}
        .actions{margin-top:36px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
        a.btn{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-size:14px;font-weight:500;padding:13px 26px;border-radius:999px;transition:all .2s}
        a.primary{background:#2D4DB1;color:#fff}
        a.primary:hover{background:#3a5bc7}
        a.ghost{border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.85)}
        a.ghost:hover{border-color:#2D4DB1;background:rgba(45,77,177,.15)}
        .links{margin-top:34px;font-size:13px;color:rgba(255,255,255,.4)}
        .links a{color:rgba(255,255,255,.65);text-decoration:none;margin:0 10px;white-space:nowrap}
        .links a:hover{color:#94A6DB}
    </style>
</head>
<body>
    <div class="wrap">
        <img src="/assets/cyn-logo-2026.webp" alt="CYN Medical Digital Agency" class="logo" onerror="this.style.display='none'" />
        <div class="code">404</div>
        <h1>ไม่พบหน้าที่คุณกำลังหา</h1>
        <p>หน้านี้อาจถูกย้าย ลบ หรือลิงก์อาจพิมพ์ผิด<br/>กลับไปหน้าหลักหรือเลือกหน้าที่ต้องการได้เลย</p>
        <div class="actions">
            <a href="/" class="btn primary">กลับหน้าแรก</a>
            <a href="/contact" class="btn ghost">ติดต่อเรา</a>
        </div>
        <div class="links">
            <a href="/services">บริการ</a>·
            <a href="/work">ผลงาน</a>·
            <a href="/about">เกี่ยวกับ CYN</a>·
            <a href="/aesthetic-clinic/">คลินิกความงาม</a>·
            <a href="/dental-clinic/">คลินิกทันตกรรม</a>
        </div>
    </div>
</body>
</html>
